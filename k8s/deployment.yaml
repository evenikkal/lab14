apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab14-collector
  labels:
    app: lab14-collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lab14-collector
  template:
    metadata:
      labels:
        app: lab14-collector
    spec:
      containers:
        - name: lab14-collector
          image: lab14-collector:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ETCD_URL
              value: "http://etcd:2379"
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
